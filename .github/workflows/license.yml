name: License

on:
  push:
    branches: ["main"]
    paths-ignore:
      - 'third_party/**'
  pull_request:
    types: [ opened, synchronize, reopened, edited ]
    paths-ignore:
      - 'third_party/**'

permissions:
  contents: read

jobs:
  check-license:
    runs-on: ubuntu-26.04-32

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check licenses
        run: .github/workflows/license.sh
        env:
          LICENSE_BASE_REF: ${{ github.event_name == 'pull_request' && 'HEAD^1' || github.event.before }}
